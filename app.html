<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>新生醫專校車智慧查詢</title><style>:root{--b:#086c63;--b2:#15b8a6;--ink:#173535;--muted:#6a8080;--line:#d8ebe8;--soft:#e8f7f4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff7f3,#f8fbfb 380px);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}.app{max-width:900px;margin:auto;padding:16px 14px 60px}.hero{padding:24px 21px;border-radius:28px;color:#fff;background:linear-gradient(135deg,#075d55,#16b6a5);box-shadow:0 18px 45px rgba(8,108,99,.15)}.hero h1{font-size:28px;line-height:1.2;margin:7px 0}.hero p{margin:0;line-height:1.65}.panel{margin-top:14px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:22px}.row,.filters{display:grid;grid-template-columns:1fr auto;gap:8px}.filters{grid-template-columns:1fr 1fr}.input,.select{width:100%;height:50px;border:1.5px solid #b8d8d4;border-radius:14px;padding:0 13px;background:#fff;font-size:16px}.btn{border:0;border-radius:14px;min-height:48px;padding:0 15px;font-weight:900}.primary{background:var(--b);color:#fff}.soft{background:var(--soft);color:var(--b)}.locate{width:100%;margin-top:8px}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:14px 0;padding:6px;border-radius:17px;background:#fff;border:1px solid var(--line);position:sticky;top:8px;z-index:20}.tab{border:0;border-radius:12px;min-height:42px;background:transparent;color:var(--muted);font-weight:900}.tab.active{background:var(--b);color:#fff}.view{display:none}.view.active{display:block}.status{display:none;margin-top:10px;padding:11px 13px;border-radius:13px;background:#fff5cf;color:#7b5900;font-size:13px;line-height:1.6}.head{display:flex;justify-content:space-between;align-items:end;margin:10px 2px}.head h2{margin:0;font-size:20px}.head small{color:var(--muted)}.cards{display:grid;gap:10px}.card{background:#fff;border:1px solid var(--line);border-radius:19px;padding:14px}.top{display:flex;justify-content:space-between;gap:10px}.name{font-size:18px;font-weight:900}.time{font-weight:900;color:#275f9e}.meta{font-size:13px;color:var(--muted);line-height:1.65;margin-top:5px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.tag{font-size:12px;padding:5px 8px;border-radius:999px;background:var(--soft);color:var(--b);font-weight:850}.dist{background:#dcfce7;color:#166534}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}.actions a{min-height:41px;border-radius:12px;display:grid;place-items:center;text-decoration:none;font-size:13px;font-weight:900}.nav{background:var(--b);color:#fff}.route{background:var(--soft);color:var(--b)}.empty{text-align:center;padding:28px;color:var(--muted);background:#fff;border:1px dashed #b7d8d3;border-radius:18px}.note{text-align:center;color:#7b8f8e;font-size:12px;line-height:1.7;margin-top:14px}@media(max-width:560px){.hero h1{font-size:24px}.row,.filters{grid-template-columns:1fr}.primary{width:100%}}</style></head><body><main class="app"><section class="hero"><div>HSC SCHOOL BUS</div><h1>附近站點＋全部完整路線</h1><p>可直接搜尋「藝文特區」等地標找附近站點，也能查看所有車號、站序、時間與候車位置。</p></section><nav class="tabs"><button class="tab active" data-v="near" onclick="switchView('near')">附近站點</button><button class="tab" data-v="all" onclick="switchView('all')">全部完整路線</button></nav><section id="near" class="view active"><section class="panel"><div style="font-weight:900;font-size:18px">輸入地址或地標</div><div style="font-size:13px;color:var(--muted);margin:5px 0 9px">例如：桃園藝文特區、台茂、龍潭大池、內壢火車站</div><div class="row"><input id="place" class="input" placeholder="地址、社區、學校或地標"><button class="btn primary" onclick="searchNearby()">找附近站點</button></div><button class="btn soft locate" onclick="useLocation()">使用我的目前位置</button><div id="status" class="status"></div></section><div class="head"><h2>附近校車站點</h2><small id="nearCount">先輸入位置</small></div><div id="nearCards" class="cards"><div class="empty">輸入地標後，系統會依距離推薦附近站點。</div></div></section><section id="all" class="view"><section class="panel"><div class="filters"><select id="area" class="select" onchange="renderAll()"><option value="">全部行政區</option></select><select id="bus" class="select" onchange="renderAll()"><option value="">全部車號</option></select></div><input id="q" class="input" style="margin-top:8px" placeholder="搜尋站名、道路、地標或路線" oninput="renderAll()"></section><div class="head"><h2>全部完整路線</h2><small id="allCount"></small></div><div id="allCards" class="cards"><div class="empty">正在載入全部路線…</div></div></section><p class="note">候車請提前至少 10 分鐘；實際資訊與臨時異動以學校最新公告為準。</p></main><script src="full-routes.js"></script><script>let stops=[];const e=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const km=(a,b,c,d)=>{const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))};function status(t){e('status').style.display='block';e('status').textContent=t}async function geo(q){const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&countrycodes=tw&q='+encodeURIComponent(q),{headers:{'Accept-Language':'zh-TW'}}),d=await r.json();if(!d.length)throw Error();return{lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name,address:d[0].address||{}}}function mapUrl(s){return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent((s.address||'')+' '+s.area+' '+s.name)}function card(s){return`<article class="card"><div class="top"><div class="name">${esc(s.name)}</div><div class="time">${esc(s.time)}</div></div><div class="meta">${esc(s.area)}<br>${esc(s.address)}</div><div class="tags">${Number.isFinite(s.dist)?`<span class="tag dist">約 ${s.dist<1?Math.round(s.dist*1000)+' 公尺':s.dist.toFixed(1)+' 公里'}</span>`:''}<span class="tag">車號 ${esc(s.bus)}</span><span class="tag">${esc(s.route)}</span><span class="tag">第 ${esc(s.order)} 站</span></div><div class="actions"><a class="nav" target="_blank" href="${mapUrl(s)}">開啟地圖</a><a class="route" href="#" onclick="showBus('${esc(s.bus)}');return false">查看此車完整路線</a></div></article>`}function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===id))}function renderAll(){const a=e('area').value,b=e('bus').value,q=e('q').value.trim().toLowerCase();const rows=stops.filter(s=>(!a||s.area===a)&&(!b||s.bus===b)&&(!q||[s.name,s.area,s.address,s.route,s.bus].join(' ').toLowerCase().includes(q)));e('allCards').innerHTML=rows.length?rows.slice(0,350).map(card).join(''):'<div class="empty">找不到符合條件的站點。</div>';e('allCount').textContent=rows.length>350?'共 '+rows.length+' 筆，先顯示 350 筆':'共 '+rows.length+' 筆'}function showBus(bus){switchView('all');e('bus').value=bus;e('area').value='';e('q').value='';renderAll();scrollTo({top:0,behavior:'smooth'})}async function locateStop(s){if(Number.isFinite(s.lat)&&Number.isFinite(s.lng))return s;const key='geo2:'+s.id;try{const c=JSON.parse(localStorage.getItem(key)||'null');if(c)return{...s,...c}}catch(x){}const p=await geo((s.address||'')+' '+s.area+' '+s.name);localStorage.setItem(key,JSON.stringify({lat:p.lat,lng:p.lng}));return{...s,lat:p.lat,lng:p.lng}}function normalizeArea(p){const a=p.address||{},city=a.city||a.county||a.state||'',district=a.city_district||a.suburb||a.town||a.village||'';return{city,district}}function chooseCandidates(p){const x=normalizeArea(p);let rows=[];if(x.district)rows=stops.filter(s=>s.area.includes(x.district));if(!rows.length&&x.city)rows=stops.filter(s=>s.area.startsWith(x.city)||x.city.includes(s.area.slice(0,3)));if(!rows.length&&p.label.includes('桃園'))rows=stops.filter(s=>s.area.startsWith('桃園市'));if(!rows.length&&p.label.includes('新竹縣'))rows=stops.filter(s=>s.area.startsWith('新竹縣'));if(!rows.length&&p.label.includes('新竹市'))rows=stops.filter(s=>s.area.startsWith('新竹市'));if(!rows.length&&p.label.includes('新北'))rows=stops.filter(s=>s.area.startsWith('新北市'));if(!rows.length&&p.label.includes('台北'))rows=stops.filter(s=>s.area.startsWith('台北市'));return rows.slice(0,40)}async function runNearby(p,label){status('已定位「'+label+'」，正在比對同區站點…');const base=chooseCandidates(p);if(!base.length)throw Error('no same-area stops');const found=[];for(let i=0;i<base.length;i++){try{const s=await locateStop(base[i]);if(Number.isFinite(s.lat)&&Number.isFinite(s.lng))found.push({...s,dist:km(p.lat,p.lng,s.lat,s.lng)})}catch(x){}status(`正在比對同區站點… ${i+1}/${base.length}`);await new Promise(r=>setTimeout(r,220))}found.sort((a,b)=>a.dist-b.dist);const rows=found.slice(0,6);e('nearCards').innerHTML=rows.length?rows.map(card).join(''):'<div class="empty">目前找不到可定位的同區站點。</div>';e('nearCount').textContent='顯示最近 '+rows.length+' 站';status(rows.length?'搜尋完成：只顯示同縣市／同行政區站點。':'此區暫無可用站點座標。')}async function searchNearby(){const q=e('place').value.trim();if(!q)return status('請先輸入地址或地標。');status('正在定位「'+q+'」…');try{const p=await geo(q);await runNearby(p,q)}catch(x){status('定位失敗，請輸入更完整名稱，例如「桃園市桃園區藝文特區」。')}}function useLocation(){if(!navigator.geolocation)return status('此瀏覽器不支援定位。');status('正在取得目前位置…');navigator.geolocation.getCurrentPosition(async pos=>{try{const r=await fetch('https://nominatim.openstreetmap.org/reverse?format=json&addressdetails=1&lat='+pos.coords.latitude+'&lon='+pos.coords.longitude,{headers:{'Accept-Language':'zh-TW'}}),d=await r.json();e('place').value='我的目前位置';await runNearby({lat:pos.coords.latitude,lng:pos.coords.longitude,label:d.display_name||'目前位置',address:d.address||{}},'目前位置')}catch(x){status('目前位置判讀失敗。')}},()=>status('無法取得位置，請確認定位權限。'))}(async()=>{stops=await loadHscRoutes();const areas=[...new Set(stops.map(s=>s.area))].sort(),buses=[...new Set(stops.map(s=>s.bus))].sort((a,b)=>Number(a)-Number(b));e('area').innerHTML='<option value="">全部行政區</option>'+areas.map(x=>`<option>${esc(x)}</option>`).join('');e('bus').innerHTML='<option value="">全部車號</option>'+buses.map(x=>`<option>${esc(x)}</option>`).join('');renderAll()})();</script></body></html>
