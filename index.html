<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b6f67">
<meta name="description" content="新生醫專校車智慧查詢：地標搜尋、全台服務分布、完整路線與候車資訊。">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://unpkg.com">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<title>新生醫專校車智慧查詢</title>
<style>
:root{--ink:#123434;--muted:#617c7b;--glass:rgba(255,255,255,.56);--glass2:rgba(255,255,255,.78);--line:rgba(255,255,255,.65);--brand:#0b7067;--brand2:#23c5b5;--soft:#e8f8f5;--shadow:0 24px 60px rgba(15,92,86,.18)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI","Noto Sans TC",sans-serif;background:radial-gradient(circle at 15% 0,#d8fff6 0,transparent 34%),radial-gradient(circle at 100% 15%,#dfeaff 0,transparent 34%),linear-gradient(180deg,#eaf8f5,#f7fbff 60%,#eef8f6);min-height:100vh}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.55),transparent 35%,rgba(255,255,255,.24));mix-blend-mode:screen}.app{max-width:1050px;margin:auto;padding:16px 14px 100px}.glass{background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(24px) saturate(145%);-webkit-backdrop-filter:blur(24px) saturate(145%);box-shadow:inset 0 1px 0 rgba(255,255,255,.75),var(--shadow)}.hero{position:relative;overflow:hidden;border-radius:34px;padding:28px 24px;color:#fff;background:linear-gradient(135deg,rgba(7,93,85,.94),rgba(21,180,165,.84));box-shadow:0 28px 70px rgba(5,95,87,.28)}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 8%,rgba(255,255,255,.35),transparent 26%),linear-gradient(115deg,rgba(255,255,255,.16),transparent 40%)}.hero:after{content:"🚌";position:absolute;right:20px;bottom:-18px;font-size:110px;opacity:.16;transform:rotate(-7deg)}.hero>*{position:relative;z-index:1}.brand{font-size:12px;font-weight:900;letter-spacing:.14em;opacity:.9}.hero h1{font-size:34px;line-height:1.18;margin:10px 0}.hero p{margin:0;max-width:660px;line-height:1.7;font-size:15px}.heroStats{display:flex;gap:8px;flex-wrap:wrap;margin-top:17px}.pill{padding:8px 11px;border-radius:999px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);font-size:12px;font-weight:850;backdrop-filter:blur(14px)}.searchCard{margin-top:16px;border-radius:28px;padding:18px}.searchTitle{font-size:20px;font-weight:900}.hint{font-size:13px;color:var(--muted);line-height:1.55;margin:5px 0 11px}.searchRow{display:grid;grid-template-columns:1fr auto;gap:9px}.input,.select{width:100%;height:54px;border:1px solid rgba(255,255,255,.75);border-radius:17px;padding:0 15px;background:rgba(255,255,255,.72);box-shadow:inset 0 1px 0 #fff,0 8px 24px rgba(37,112,105,.08);outline:none;color:var(--ink);font-size:16px}.input:focus,.select:focus{box-shadow:0 0 0 4px rgba(35,197,181,.17),inset 0 1px 0 #fff}.btn{min-height:50px;border:1px solid rgba(255,255,255,.7);border-radius:16px;padding:0 17px;font-weight:900;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 10px 24px rgba(14,99,91,.14)}.primary{background:linear-gradient(180deg,#128d82,#0a6c64);color:#fff}.secondary{background:rgba(255,255,255,.72);color:var(--brand)}.locate{width:100%;margin-top:9px}.chips{display:flex;gap:8px;overflow:auto;padding-top:12px}.chip{white-space:nowrap;min-height:39px;border-radius:999px;border:1px solid rgba(255,255,255,.72);background:rgba(255,255,255,.64);color:#426563;font-weight:850;padding:0 13px;box-shadow:inset 0 1px 0 #fff}.status{display:none;margin-top:11px;padding:11px 13px;border-radius:15px;background:rgba(255,247,211,.85);color:#795900;font-size:13px;line-height:1.6}.tabs{position:sticky;top:8px;z-index:50;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:16px 0 12px;padding:6px;border-radius:21px}.tab{min-height:44px;border:0;border-radius:15px;background:transparent;color:#5b7473;font-weight:900}.tab.active{background:linear-gradient(180deg,#188f84,#0b7067);color:#fff;box-shadow:0 10px 24px rgba(11,112,103,.22)}.view{display:none}.view.active{display:block}.head{display:flex;justify-content:space-between;align-items:end;margin:8px 3px 11px}.head h2{font-size:21px;margin:0}.head small{color:var(--muted)}.mapWrap{padding:9px;border-radius:28px}.map{height:520px;border-radius:22px;overflow:hidden}.mapLegend{display:flex;gap:8px;flex-wrap:wrap;padding:12px 4px 2px}.legend{font-size:12px;color:var(--muted);padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.58)}.cards{display:grid;gap:11px}.card{padding:16px;border-radius:22px}.cardTop{display:flex;justify-content:space-between;gap:12px}.name{font-size:18px;font-weight:900}.area{font-size:13px;color:var(--muted);margin-top:3px}.time{height:max-content;padding:7px 10px;border-radius:12px;background:rgba(230,241,255,.85);color:#245e9f;font-weight:900}.tags{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.tag{padding:5px 8px;border-radius:999px;background:rgba(232,248,245,.88);color:#286762;font-size:12px;font-weight:850}.address{font-size:13px;color:#526d6b;line-height:1.7}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.action{min-height:43px;border-radius:14px;display:grid;place-items:center;text-decoration:none;border:1px solid rgba(255,255,255,.7);font-size:13px;font-weight:900}.nav{background:linear-gradient(180deg,#138f84,#0b7067);color:#fff}.soft{background:rgba(255,255,255,.7);color:var(--brand)}.filters{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}.empty{padding:30px 18px;border-radius:22px;text-align:center;color:var(--muted);line-height:1.7}.bottom{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:80;width:min(94%,670px);display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:7px;border-radius:21px}.bottom button{min-height:45px;border:0;border-radius:15px;font-weight:900}footer{text-align:center;color:#7b9291;font-size:12px;line-height:1.7;margin-top:16px}@media(max-width:620px){.hero h1{font-size:27px}.searchRow,.filters{grid-template-columns:1fr}.primary{width:100%}.map{height:440px}}
</style>
</head>
<body>
<main class="app" id="top">
<section class="hero"><div class="brand">HSIN SHENG SCHOOL BUS</div><h1>從你的位置出發，<br>找到最適合的校車站</h1><p>輸入地址、社區、學校或地標，搭配全台校車服務分布與完整路線，讓新生與家長快速掌握搭車資訊。</p><div class="heroStats"><span class="pill" id="heroStops">完整站點載入中</span><span class="pill" id="heroBuses">車號載入中</span><span class="pill">全台服務分布</span></div></section>
<section class="searchCard glass"><div class="searchTitle">你從哪裡搭車？</div><div class="hint">可輸入「桃園藝文特區、台茂、龍潭大池、內壢火車站」等地標或完整地址。</div><div class="searchRow"><input id="place" class="input" placeholder="地址、社區、學校或地標"><button class="btn primary" onclick="searchPlace()">搜尋附近路線</button></div><button class="btn secondary locate" onclick="useLocation()">使用我的目前位置</button><div class="chips"><button class="chip" onclick="quick('桃園藝文特區')">藝文特區</button><button class="chip" onclick="quick('台茂購物中心')">台茂</button><button class="chip" onclick="quick('內壢火車站')">內壢火車站</button><button class="chip" onclick="quick('龍潭大池')">龍潭大池</button></div><div id="status" class="status"></div></section>
<nav class="tabs glass"><button class="tab active" data-v="mapView" onclick="switchView('mapView')">服務地圖</button><button class="tab" data-v="nearView" onclick="switchView('nearView')">附近候選</button><button class="tab" data-v="allView" onclick="switchView('allView')">完整路線</button></nav>
<section id="mapView" class="view active"><div class="head"><h2>全台校車服務分布</h2><small>點選區域查看站點數</small></div><div class="mapWrap glass"><div id="map" class="map"></div><div class="mapLegend"><span class="legend">圓圈大小代表該行政區站點數</span><span class="legend">搜尋後會自動移動到該區域</span></div></div></section>
<section id="nearView" class="view"><div class="head"><h2>附近路線候選</h2><small id="nearCount">先輸入位置</small></div><div id="nearCards" class="cards"><div class="empty glass">輸入地標或地址後，系統會快速推薦鄰近行政區的校車站點。</div></div></section>
<section id="allView" class="view"><div class="head"><h2>全部完整路線</h2><small id="allCount"></small></div><div class="filters"><select id="area" class="select" onchange="renderAll()"><option value="">全部行政區</option></select><input id="keyword" class="input" placeholder="搜尋站名、道路、地標或車號" oninput="renderAll()"></div><div id="allCards" class="cards"></div></section>
<footer>候車請提前至少 10 分鐘；實際行車與臨時異動以學校最新公告為準。</footer>
</main>
<div class="bottom glass"><button class="primary" onclick="sharePage()">分享網站</button><button class="secondary" onclick="scrollTo({top:0,behavior:'smooth'})">回到頂端</button></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="full-routes.js"></script>
<script>
let stops=[],map,areaLayers=[];const $=id=>document.getElementById(id);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const centers={'桃園市桃園區':[24.9937,121.3010],'桃園市中壢區':[24.9537,121.2258],'桃園市平鎮區':[24.9296,121.2140],'桃園市八德區':[24.9304,121.2840],'桃園市蘆竹區':[25.0454,121.2928],'桃園市大園區':[25.0645,121.1961],'桃園市龜山區':[25.0180,121.3656],'桃園市龍潭區':[24.8647,121.2168],'桃園市楊梅區':[24.9123,121.1459],'桃園市觀音區':[25.0359,121.0809],'桃園市新屋區':[24.9722,121.1053],'新竹縣竹北市':[24.8388,121.0095],'新竹縣湖口鄉':[24.9029,121.0449],'新竹縣新豐鄉':[24.9022,120.9867],'新竹市東區':[24.8039,120.9647],'新竹市北區':[24.8138,120.9524],'新竹市香山區':[24.7689,120.9251],'新北市三峽區':[24.9343,121.3691],'新北市鶯歌區':[24.9554,121.3542],'台北市':[25.0375,121.5637]};
function showStatus(t){$('status').style.display='block';$('status').textContent=t}
function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===id));if(id==='mapView'&&map)setTimeout(()=>map.invalidateSize(),80)}
function card(s){return `<article class="card glass"><div class="cardTop"><div><div class="name">${esc(s.name)}</div><div class="area">${esc(s.area)}</div></div><div class="time">${esc(s.time||'時間未填')}</div></div><div class="tags"><span class="tag">車號 ${esc(s.bus)}</span><span class="tag">${esc(s.route||'未命名路線')}</span><span class="tag">第 ${esc(s.order||'—')} 站</span></div><div class="address">${esc(s.address||'候車位置待補')}</div><div class="actions"><a class="action nav" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent((s.address||'')+' '+s.area+' '+s.name)}">開啟地圖</a><button class="action soft" onclick="filterBus('${esc(s.bus)}')">查看此車路線</button></div></article>`}
function renderAll(){const a=$('area').value,k=$('keyword').value.trim().toLowerCase();const rows=stops.filter(s=>(!a||s.area===a)&&(!k||[s.name,s.area,s.address,s.route,s.bus].join(' ').toLowerCase().includes(k)));$('allCards').innerHTML=rows.length?rows.slice(0,300).map(card).join(''):'<div class="empty glass">找不到符合條件的站點。</div>';$('allCount').textContent=rows.length>300?`共 ${rows.length} 筆，先顯示 300 筆`:`共 ${rows.length} 筆`}
function filterBus(bus){switchView('allView');$('area').value='';$('keyword').value=bus;renderAll();scrollTo({top:document.querySelector('.tabs').offsetTop-8,behavior:'smooth'})}
function initMap(){map=L.map('map',{zoomControl:false}).setView([24.93,121.18],9);L.control.zoom({position:'bottomright'}).addTo(map);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);renderMap()}
function renderMap(){areaLayers.forEach(x=>x.remove());areaLayers=[];const counts={};stops.forEach(s=>counts[s.area]=(counts[s.area]||0)+1);Object.entries(counts).forEach(([area,count])=>{const c=centers[area]||centers[area.replace(/區$/,'')];if(!c)return;const layer=L.circleMarker(c,{radius:Math.min(22,7+Math.sqrt(count)*2),weight:2,color:'#0b7067',fillColor:'#35c7b8',fillOpacity:.68}).addTo(map).bindPopup(`<b>${esc(area)}</b><br>${count} 個站點<br><button onclick="window.selectArea('${esc(area)}')">查看站點</button>`);areaLayers.push(layer)})}
window.selectArea=function(area){$('area').value=area;renderAll();switchView('allView')}
async function geocode(q){const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=1&countrycodes=tw&q='+encodeURIComponent(q),{headers:{'Accept-Language':'zh-TW'}});const d=await r.json();if(!d.length)throw Error();return{lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name,address:d[0].address||{}}}
function nearestAreas(p){return Object.entries(centers).map(([area,c])=>({area,d:(p.lat-c[0])**2+(p.lng-c[1])**2})).sort((a,b)=>a.d-b.d).slice(0,3).map(x=>x.area)}
async function searchPlace(){const q=$('place').value.trim();if(!q)return showStatus('請先輸入地址或地標。');showStatus('正在定位「'+q+'」…');try{const p=await geocode(q);const areas=nearestAreas(p),rows=[];areas.forEach(a=>rows.push(...stops.filter(s=>s.area===a).slice(0,8)));$('nearCards').innerHTML=rows.length?rows.slice(0,12).map(card).join(''):'<div class="empty glass">目前找不到附近行政區的校車站點。</div>';$('nearCount').textContent=`鄰近 ${areas.join('、')}`;showStatus('定位完成，已顯示附近行政區的校車候選站點。');switchView('nearView');map.setView([p.lat,p.lng],12);L.marker([p.lat,p.lng]).addTo(map).bindPopup(q).openPopup()}catch(e){showStatus('定位失敗，請輸入更完整名稱，例如「桃園市桃園區藝文特區」。')}}
function quick(q){$('place').value=q;searchPlace()}
function useLocation(){if(!navigator.geolocation)return showStatus('此瀏覽器不支援定位。');showStatus('正在取得目前位置…');navigator.geolocation.getCurrentPosition(pos=>{const p={lat:pos.coords.latitude,lng:pos.coords.longitude};const areas=nearestAreas(p),rows=[];areas.forEach(a=>rows.push(...stops.filter(s=>s.area===a).slice(0,8)));$('nearCards').innerHTML=rows.slice(0,12).map(card).join('');$('nearCount').textContent=`鄰近 ${areas.join('、')}`;switchView('nearView');showStatus('已依目前位置顯示附近行政區候選站點。');map.setView([p.lat,p.lng],12)},()=>showStatus('無法取得位置，請確認定位權限。'))}
async function sharePage(){try{navigator.share?await navigator.share({title:document.title,text:'新生醫專校車智慧查詢',url:location.href}):await navigator.clipboard.writeText(location.href)}catch(e){}}
(async()=>{stops=await loadHscRoutes();const areas=[...new Set(stops.map(s=>s.area))].sort(),buses=[...new Set(stops.map(s=>s.bus))];$('area').innerHTML='<option value="">全部行政區</option>'+areas.map(x=>`<option>${esc(x)}</option>`).join('');$('heroStops').textContent=`${stops.length} 筆完整站點`;$('heroBuses').textContent=`${buses.length} 個校車車號`;renderAll();initMap()})();
</script>
</body>
</html>
