<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#086c63">
<meta name="description" content="新生醫專完整校車路線、站點、時間與候車位置查詢。">
<link rel="manifest" href="manifest.webmanifest">
<title>新生醫專校車智慧站點查詢</title>
<style>
:root{--b:#086c63;--b2:#12b8a5;--ink:#173535;--muted:#697f7e;--line:#d7ebe8;--soft:#e8f7f4;--bg:#f4faf9;--card:#fff;--shadow:0 16px 40px rgba(8,108,99,.12)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 90% -10%,#bdf4eb 0,transparent 34%),linear-gradient(180deg,#e8f8f5,#f8fbfb 420px);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input,select{font:inherit}.app{max-width:980px;margin:auto;padding:14px 14px 92px}.hero{position:relative;overflow:hidden;color:#fff;background:linear-gradient(135deg,#075d55,#12ad9d 68%,#42c8bb);border-radius:30px;padding:25px 22px;box-shadow:var(--shadow)}.hero:after{content:"🚌";position:absolute;right:15px;bottom:-20px;font-size:102px;opacity:.16;transform:rotate(-8deg)}.brand{font-size:12px;font-weight:950;letter-spacing:.12em}.hero h1{font-size:30px;line-height:1.2;margin:9px 0}.hero p{margin:0;line-height:1.65;font-size:15px;max-width:650px}.stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.stat{padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.24);font-size:12px;font-weight:850}.panel{margin-top:15px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:17px;box-shadow:0 10px 28px rgba(8,108,99,.08)}.title{font-size:18px;font-weight:950}.hint{color:var(--muted);font-size:13px;line-height:1.55;margin:5px 0 10px}.grid{display:grid;grid-template-columns:1.15fr .85fr;gap:9px}.input,.select{width:100%;height:50px;border:1.5px solid #b8d8d4;border-radius:14px;background:#fff;padding:0 13px;color:var(--ink);outline:none}.input:focus,.select:focus{border-color:var(--b2);box-shadow:0 0 0 4px rgba(18,184,165,.12)}.btn{min-height:48px;border:0;border-radius:14px;padding:0 15px;font-weight:950;cursor:pointer}.primary{background:var(--b);color:#fff}.soft{background:var(--soft);color:var(--b)}.searchrow{display:grid;grid-template-columns:1fr auto;gap:9px;margin-top:9px}.status{display:none;margin-top:11px;padding:11px 13px;border-radius:13px;background:#fff5d0;color:#7b5900;font-size:13px;line-height:1.6}.tabs{position:sticky;top:8px;z-index:40;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:15px 0 11px;padding:6px;border-radius:18px;background:rgba(255,255,255,.91);backdrop-filter:blur(14px);border:1px solid var(--line);box-shadow:0 8px 24px rgba(8,108,99,.09)}.tab{border:0;border-radius:13px;min-height:42px;background:transparent;color:#5e7574;font-weight:950}.tab.active{background:var(--b);color:#fff}.view{display:none}.view.active{display:block}.head{display:flex;justify-content:space-between;align-items:end;margin:7px 2px 10px}.head h2{font-size:20px;margin:0}.head small{color:var(--muted)}.cards{display:grid;gap:11px}.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 8px 22px rgba(8,108,99,.065)}.cardtop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}.name{font-size:18px;font-weight:950}.area{font-size:13px;color:var(--muted);margin-top:3px}.time{flex:none;padding:7px 9px;border-radius:11px;background:#e8f2ff;color:#255d9d;font-weight:950}.tags{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0}.tag{font-size:12px;font-weight:900;padding:5px 8px;border-radius:999px;background:#edf8f6;color:#286762}.route{background:#fff2cc;color:#775600}.address{font-size:13px;color:#526968;line-height:1.7}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.action{min-height:42px;border:0;border-radius:12px;display:grid;place-items:center;text-decoration:none;font-weight:950;font-size:13px}.map{background:var(--b);color:#fff}.copy{background:var(--soft);color:var(--b)}.empty{padding:30px 18px;border:1px dashed #b5d7d2;border-radius:20px;background:#fff;text-align:center;color:var(--muted);line-height:1.7}.routegroups{display:grid;gap:12px}.group{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden}.grouphead{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:14px 15px;background:#edf8f6}.grouphead b{font-size:16px}.grouphead span{font-size:12px;color:var(--muted)}.routeStops{padding:7px 14px 13px}.routeStop{display:grid;grid-template-columns:58px 1fr;gap:9px;padding:9px 0;border-bottom:1px solid #edf2f1}.routeStop:last-child{border-bottom:0}.routeTime{font-weight:950;color:#27635e}.routeName{font-weight:850}.routeAddr{font-size:12px;color:var(--muted);line-height:1.5;margin-top:2px}.summary{margin-top:13px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.sum{background:#fff;border:1px solid var(--line);border-radius:17px;padding:12px;text-align:center}.sum b{display:block;font-size:19px;color:var(--b)}.sum span{font-size:11px;color:var(--muted)}.note,footer{font-size:12px;color:#7b8f8e;line-height:1.7;text-align:center;margin-top:14px}.bottom{position:fixed;left:50%;bottom:10px;transform:translateX(-50%);z-index:50;width:min(94%,650px);display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:7px;border-radius:19px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border:1px solid var(--line);box-shadow:0 12px 34px rgba(0,0,0,.14)}.bottom button{min-height:44px;border:0;border-radius:13px;font-weight:950}@media(max-width:620px){.hero h1{font-size:25px}.grid,.searchrow{grid-template-columns:1fr}.primary{width:100%}.summary{grid-template-columns:repeat(3,1fr)}.cardtop{align-items:center}}
</style>
</head>
<body>
<main class="app" id="top">
<section class="hero"><div class="brand">HSC SCHOOL BUS</div><h1>完整校車路線<br>一次查清楚</h1><p>可依行政區、車號、路線或站名搜尋，查看每站上車時間與候車位置；也能直接開啟 Google Maps。</p><div class="stats"><span class="stat" id="heroStops">載入站點中</span><span class="stat" id="heroBuses">載入車號中</span><span class="stat">手機快速查詢</span></div></section>
<section class="panel"><div class="title">快速篩選</div><div class="hint">先選行政區或車號，再搜尋站名、道路名稱或候車地標。</div><div class="grid"><select id="area" class="select" onchange="renderStops()"><option value="">全部行政區</option></select><select id="bus" class="select" onchange="renderStops()"><option value="">全部車號／路線</option></select></div><div class="searchrow"><input id="keyword" class="input" placeholder="搜尋站名、路線、道路或地標" oninput="renderStops()"><button class="btn primary" onclick="clearFilters()">顯示全部</button></div><button class="btn soft" style="width:100%;margin-top:9px" onclick="useMyArea()">📍 依目前位置推薦行政區</button><div id="status" class="status"></div></section>
<div class="summary"><div class="sum"><b id="sumStops">—</b><span>站點筆數</span></div><div class="sum"><b id="sumBuses">—</b><span>校車車號</span></div><div class="sum"><b id="sumAreas">—</b><span>服務行政區</span></div></div>
<nav class="tabs"><button class="tab active" data-v="stops" onclick="switchView('stops')">站點查詢</button><button class="tab" data-v="routes" onclick="switchView('routes')">完整路線</button><button class="tab" data-v="saved" onclick="switchView('saved')">我的收藏</button></nav>
<section id="stops" class="view active"><div class="head"><h2>站點結果</h2><small id="resultCount"></small></div><div id="stopCards" class="cards"><div class="empty">正在載入完整路線資料…</div></div></section>
<section id="routes" class="view"><div class="head"><h2>依車號查看路線</h2><small>依上車順序排列</small></div><div id="routeGroups" class="routegroups"></div></section>
<section id="saved" class="view"><div class="head"><h2>收藏站點</h2><small>保存在此裝置</small></div><div id="savedCards" class="cards"></div></section>
<p class="note">候車請提前至少 10 分鐘抵達。符號「＆、∪」表示鄰接街道，「Δ」表示對向街道。實際行車與臨時異動以學校最新通知為準。</p><footer>新生醫護管理專科學校｜校車智慧查詢</footer>
</main>
<div class="bottom"><button class="primary" onclick="sharePage()">分享網站</button><button class="soft" onclick="scrollTo({top:0,behavior:'smooth'})">回到頂端</button></div>
<script src="full-routes.js"></script>
<script>
let stops=[];
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const favorites=()=>JSON.parse(localStorage.getItem('hsc-bus-favorites')||'[]');
function showStatus(t){$('status').style.display='block';$('status').textContent=t}
function routeLabel(s){return `車號 ${s.bus}${s.route?'｜'+s.route:''}`}
function mapsUrl(s){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(`${s.address} ${s.area} ${s.name}`)}
function card(s){const on=favorites().includes(s.id);return `<article class="card"><div class="cardtop"><div><div class="name">${esc(s.name)}</div><div class="area">${esc(s.area)}</div></div><div class="time">${esc(s.time||'時間未填')}</div></div><div class="tags"><span class="tag route">${esc(routeLabel(s))}</span><span class="tag">第 ${esc(s.order||'—')} 站</span></div><div class="address">${esc(s.address||'候車位置待補')}</div><div class="actions"><a class="action map" target="_blank" rel="noopener" href="${mapsUrl(s)}">開啟地圖</a><button class="action copy" onclick="toggleFavorite('${esc(s.id)}')">${on?'★ 已收藏':'☆ 收藏站點'}</button></div></article>`}
function filtered(){const a=$('area').value,b=$('bus').value,k=$('keyword').value.trim().toLowerCase();return stops.filter(s=>(!a||s.area===a)&&(!b||s.bus===b)&&(!k||[s.name,s.area,s.bus,s.route,s.address].join(' ').toLowerCase().includes(k)))}
function renderStops(){const rows=filtered();$('stopCards').innerHTML=rows.length?rows.slice(0,250).map(card).join(''):'<div class="empty">找不到符合條件的站點，請換個關鍵字。</div>';$('resultCount').textContent=rows.length>250?`共 ${rows.length} 筆，先顯示 250 筆`:`共 ${rows.length} 筆`}
function renderRoutes(){const by={};stops.forEach(s=>(by[s.bus]??=[]).push(s));$('routeGroups').innerHTML=Object.keys(by).sort((a,b)=>Number(a)-Number(b)).map(bus=>{const rows=by[bus].sort((a,b)=>Number(a.order)-Number(b.order));const title=rows[0]?.route||'未命名路線';return `<section class="group"><div class="grouphead"><b>車號 ${esc(bus)}｜${esc(title)}</b><span>${rows.length} 站</span></div><div class="routeStops">${rows.map(s=>`<div class="routeStop"><div class="routeTime">${esc(s.time)}</div><div><div class="routeName">${esc(s.order)}. ${esc(s.name)}</div><div class="routeAddr">${esc(s.area)}｜${esc(s.address)}</div></div></div>`).join('')}</div></section>`}).join('')}
function renderSaved(){const f=favorites(),rows=stops.filter(s=>f.includes(s.id));$('savedCards').innerHTML=rows.length?rows.map(card).join(''):'<div class="empty">尚未收藏站點。找到常用站點後，按下「收藏站點」即可。</div>'}
function toggleFavorite(id){let f=favorites();f=f.includes(id)?f.filter(x=>x!==id):[...f,id];localStorage.setItem('hsc-bus-favorites',JSON.stringify(f));renderStops();renderSaved()}
function populate(){const areas=[...new Set(stops.map(s=>s.area))].sort(),buses=[...new Set(stops.map(s=>s.bus))].sort((a,b)=>Number(a)-Number(b));$('area').innerHTML='<option value="">全部行政區</option>'+areas.map(x=>`<option>${esc(x)}</option>`).join('');$('bus').innerHTML='<option value="">全部車號／路線</option>'+buses.map(x=>{const r=stops.find(s=>s.bus===x)?.route||'';return `<option value="${esc(x)}">車號 ${esc(x)}${r?'｜'+esc(r):''}</option>`}).join('');$('sumStops').textContent=stops.length;$('sumBuses').textContent=buses.length;$('sumAreas').textContent=areas.length;$('heroStops').textContent=`${stops.length} 筆站點`;$('heroBuses').textContent=`${buses.length} 個車號`}
function clearFilters(){$('area').value='';$('bus').value='';$('keyword').value='';renderStops()}
function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===id));if(id==='routes')renderRoutes();if(id==='saved')renderSaved()}
function useMyArea(){if(!navigator.geolocation)return showStatus('此瀏覽器不支援定位功能。');showStatus('正在取得目前位置…');navigator.geolocation.getCurrentPosition(async p=>{try{const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}&zoom=12`,{headers:{'Accept-Language':'zh-TW'}}),d=await r.json(),text=JSON.stringify(d.address||{});const area=[...new Set(stops.map(s=>s.area))].find(a=>text.includes(a.replace(/^桃園市|^新竹縣|^新竹市|^台北市|^新北市/,'')));if(area){$('area').value=area;renderStops();showStatus(`已推薦「${area}」的站點。`)}else showStatus('已取得位置，但目前無法自動對應行政區，請手動選擇。')}catch(e){showStatus('定位成功，但行政區判讀暫時失敗。')}},()=>showStatus('無法取得位置，請確認定位權限。'),{enableHighAccuracy:true,timeout:10000})}
async function sharePage(){try{if(navigator.share)await navigator.share({title:document.title,text:'新生醫專完整校車路線查詢',url:location.href});else{await navigator.clipboard.writeText(location.href);alert('網址已複製')}}catch(e){}}
(async()=>{stops=await loadHscRoutes();populate();renderStops();renderSaved();if(stops.length<100)showStatus('完整資料來源暫時無法連線，目前顯示備援站點。重新整理後可再試一次。');if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js')})();
</script>
</body></html>
