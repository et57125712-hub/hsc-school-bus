<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>新生醫專校車智慧站點查詢</title><meta name="theme-color" content="#0d6f66">
<link rel="preconnect" href="https://unpkg.com"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{--brand:#0d6f66;--brand2:#17b6a5;--ink:#173434;--muted:#6d8181;--bg:#f4fbfa;--line:#dbecea;--soft:#eaf8f6;--card:#fff;--shadow:0 18px 42px rgba(12,104,96,.12)}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#dff7f3 0,#f7fbfb 330px);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--ink)}button,input,select{font:inherit}.app{max-width:860px;margin:auto;padding:16px 14px 88px}.hero{position:relative;overflow:hidden;padding:26px 22px;border-radius:28px;color:#fff;background:linear-gradient(135deg,#075e57,#14b8a6);box-shadow:var(--shadow)}.hero:before{content:"";position:absolute;width:240px;height:240px;border-radius:50%;right:-80px;top:-100px;background:rgba(255,255,255,.12)}.hero:after{content:"🚌";position:absolute;right:20px;bottom:-16px;font-size:92px;opacity:.16;transform:rotate(-8deg)}.kicker{font-size:12px;font-weight:900;letter-spacing:.12em;opacity:.88}.hero h1{font-size:30px;line-height:1.25;margin:8px 0}.hero p{margin:0;line-height:1.7;font-size:15px;max-width:580px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:16px;max-width:520px}.stat{padding:10px;border-radius:15px;text-align:center;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(8px)}.stat b{display:block;font-size:18px}.stat span{font-size:11px;opacity:.86}.panel{margin-top:15px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:17px;box-shadow:0 10px 28px rgba(12,104,96,.08)}.label{display:block;font-weight:900;margin-bottom:8px}.searchrow{display:grid;grid-template-columns:1fr auto;gap:9px}.input{width:100%;height:52px;border:1.5px solid #bad9d5;border-radius:15px;padding:0 14px;outline:none}.input:focus{border-color:var(--brand2);box-shadow:0 0 0 4px rgba(23,182,165,.12)}.btn{border:0;border-radius:14px;min-height:48px;padding:0 16px;font-weight:900;cursor:pointer}.primary{background:var(--brand);color:#fff}.secondary{width:100%;margin-top:10px;background:var(--soft);color:var(--brand)}.tools{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}.ghost{background:#fff;border:1px solid var(--line);color:#486565}.chips{display:flex;gap:8px;overflow:auto;padding:12px 0 2px}.chip{border:1px solid var(--line);background:#fff;color:#426261;white-space:nowrap;min-height:38px;border-radius:999px;padding:0 13px;font-weight:800}.status{display:none;margin-top:12px;padding:11px 13px;border-radius:13px;background:#fff7d7;color:#8b6400;line-height:1.6;font-size:13px}.tabs{position:sticky;top:8px;z-index:50;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:16px 0 12px;padding:6px;border-radius:18px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);box-shadow:0 8px 24px rgba(12,104,96,.09);border:1px solid var(--line)}.tab{border:0;border-radius:13px;min-height:42px;background:transparent;color:#587170;font-weight:900}.tab.active{background:var(--brand);color:#fff}.view{display:none}.view.active{display:block}.sectionhead{display:flex;align-items:end;justify-content:space-between;margin:8px 2px 10px}.sectionhead h2{margin:0;font-size:20px}.sectionhead span{font-size:12px;color:var(--muted)}.cards{display:grid;gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:21px;padding:16px;box-shadow:0 9px 24px rgba(12,104,96,.07)}.cardtop{display:flex;gap:12px}.rank{width:40px;height:40px;display:grid;place-items:center;flex:none;border-radius:13px;background:var(--soft);color:var(--brand);font-weight:950}.card h3{margin:0 0 4px;font-size:18px}.meta{font-size:13px;color:var(--muted);line-height:1.65}.badges{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}.badge{padding:5px 8px;border-radius:999px;background:#edf8f6;color:#286762;font-size:12px;font-weight:900}.distance{background:#dcfce7;color:#166534}.actions{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:13px}.action{display:grid;place-items:center;min-height:43px;border-radius:12px;text-decoration:none;font-size:13px;font-weight:900}.nav{background:var(--brand);color:#fff}.detail{background:var(--soft);color:var(--brand)}.fav{border:1px solid var(--line);background:#fff;color:#607877;width:43px}.fav.on{color:#e19b00;background:#fff8df}.map{height:480px;border-radius:22px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}.filterrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}.select{height:46px;border:1px solid var(--line);border-radius:13px;background:#fff;padding:0 11px;color:var(--ink)}.empty{text-align:center;padding:30px 18px;background:#fff;border:1px dashed #b9d8d4;border-radius:20px;color:var(--muted);line-height:1.7}.notice{font-size:12px;color:#748d8c;line-height:1.7;margin:14px 4px}.bottom{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;width:min(94%,640px);z-index:70;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:7px;border-radius:19px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);box-shadow:0 12px 34px rgba(0,0,0,.14);border:1px solid var(--line)}.bottom button{border:0;border-radius:13px;min-height:44px;font-weight:900}.share{background:var(--brand);color:#fff}.topbtn{background:var(--soft);color:var(--brand)}footer{text-align:center;font-size:12px;color:#829494;margin-top:24px}@media(max-width:540px){.hero h1{font-size:25px}.searchrow{grid-template-columns:1fr}.primary{width:100%}.map{height:430px}.actions{grid-template-columns:1fr 1fr auto}.filterrow{grid-template-columns:1fr}.stats{gap:6px}.stat{padding:9px 5px}}
</style></head>
<body><main class="app" id="top">
<section class="hero"><div class="kicker">HSC SCHOOL BUS</div><h1>新生醫專<br>校車智慧站點查詢</h1><p>輸入住家地址或開啟定位，立即比較最近站點、上車時間、路線與導航方向。</p><div class="stats"><div class="stat"><b>70+</b><span>校車路線</span></div><div class="stat"><b>多縣市</b><span>服務範圍</span></div><div class="stat"><b>1鍵</b><span>地圖導航</span></div></div></section>
<section class="panel"><label class="label" for="address">輸入住家地址</label><div class="searchrow"><input class="input" id="address" placeholder="例如：桃園市龍潭區中正路" autocomplete="street-address"><button class="btn primary" onclick="searchAddress()">搜尋最近站點</button></div><button class="btn secondary" onclick="useLocation()">📍 使用我的目前位置</button><div class="tools"><button class="btn ghost" onclick="showFavorites()">⭐ 我的收藏</button><button class="btn ghost" onclick="resetSearch()">↻ 重新查詢</button></div><div class="chips"><button class="chip" onclick="quickSearch('龍潭')">龍潭</button><button class="chip" onclick="quickSearch('中壢')">中壢</button><button class="chip" onclick="quickSearch('桃園')">桃園</button><button class="chip" onclick="quickSearch('楊梅')">楊梅</button><button class="chip" onclick="quickSearch('新竹')">新竹</button><button class="chip" onclick="quickSearch('竹北')">竹北</button></div><div id="status" class="status"></div></section>
<nav class="tabs"><button class="tab active" data-view="nearest" onclick="switchView('nearest')">最近站點</button><button class="tab" data-view="mapview" onclick="switchView('mapview')">地圖模式</button><button class="tab" data-view="all" onclick="switchView('all')">全部站點</button></nav>
<section id="nearest" class="view active"><div class="sectionhead"><h2>推薦站點</h2><span id="count">依距離排序</span></div><div id="results" class="cards"></div></section>
<section id="mapview" class="view"><div class="sectionhead"><h2>站點地圖</h2><span>點選標記查看資訊</span></div><div id="map" class="map"></div></section>
<section id="all" class="view"><div class="sectionhead"><h2>全部站點</h2><span id="allcount"></span></div><div class="filterrow"><select id="areaFilter" class="select" onchange="renderAll()"><option value="">全部地區</option></select><input id="keyword" class="input" placeholder="搜尋站名或路線" oninput="renderAll()"></div><div id="allresults" class="cards"></div></section>
<p class="notice">※ 系統目前已完成正式功能介面；站點資料正依學校路線表逐筆校對。距離採直線估算，實際步行路線與乘車資訊請以學校最新公告為準。</p><footer>新生醫護管理專科學校｜校車智慧查詢</footer></main>
<div class="bottom"><button class="share" onclick="sharePage()">分享查詢網站</button><button class="topbtn" onclick="scrollTo({top:0,behavior:'smooth'})">回到頂端</button></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script>
const stops=[
{name:'龍潭國小',area:'桃園市龍潭區',route:'67',time:'07:14',fee:'5,730',note:'龍潭國小校門口公車亭',lat:24.8656,lng:121.2169},
{name:'龍潭中正大同路口',area:'桃園市龍潭區',route:'67',time:'07:12',fee:'5,730',note:'中正路與大同路口附近',lat:24.8640,lng:121.2216},
{name:'龍潭百年大鎮',area:'桃園市龍潭區',route:'66',time:'07:02',fee:'5,950',note:'百年大鎮社區周邊',lat:24.8787,lng:121.2113},
{name:'中壢火車站',area:'桃園市中壢區',route:'31',time:'06:20',fee:'17,610',note:'火車站周邊指定候車點',lat:24.9537,lng:121.2258},
{name:'中壢監理站',area:'桃園市中壢區',route:'4',time:'06:36',fee:'11,780',note:'監理站周邊公車停靠區',lat:24.9488,lng:121.2526},
{name:'內壢火車站',area:'桃園市中壢區',route:'6',time:'06:32',fee:'11,780',note:'內壢火車站前',lat:24.9727,lng:121.2583},
{name:'桃園火車站',area:'桃園市桃園區',route:'17',time:'06:50',fee:'12,860',note:'桃園火車站周邊指定候車點',lat:24.9892,lng:121.3140},
{name:'桃園市政府',area:'桃園市桃園區',route:'17',time:'06:51',fee:'13,940',note:'市府周邊公車停靠區',lat:24.9934,lng:121.3010},
{name:'楊梅火車站',area:'桃園市楊梅區',route:'48',time:'06:20',fee:'10,700',note:'楊梅火車站前',lat:24.9142,lng:121.1451},
{name:'埔心火車站',area:'桃園市楊梅區',route:'52',time:'06:55',fee:'10,700',note:'埔心火車站前',lat:24.9197,lng:121.1837},
{name:'新竹火車站',area:'新竹市東區',route:'31',time:'06:20',fee:'17,610',note:'新竹火車站周邊指定候車點',lat:24.8016,lng:120.9716},
{name:'竹北火車站',area:'新竹縣竹北市',route:'34',time:'06:20',fee:'13,940',note:'竹北火車站前',lat:24.8388,lng:121.0095}
];
const presets={龍潭:[24.8647,121.2168],中壢:[24.9537,121.2258],桃園:[24.9937,121.3010],楊梅:[24.9123,121.1459],新竹:[24.8039,120.9647],竹北:[24.8388,121.0095]};let origin=presets.龍潭,map,markers=[];
function km(a,b,c,d){const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180;const z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))}
function withDist(){return stops.map(s=>({...s,dist:origin?km(origin[0],origin[1],s.lat,s.lng):null})).sort((a,b)=>(a.dist??999)-(b.dist??999))}
function favs(){return JSON.parse(localStorage.getItem('hscBusFavs')||'[]')}function isFav(s){return favs().includes(s.name)}function toggleFav(name){let f=favs();f=f.includes(name)?f.filter(x=>x!==name):[...f,name];localStorage.setItem('hscBusFavs',JSON.stringify(f));renderNearest()}
function card(s,i){const d=s.dist==null?'':`<span class="badge distance">約 ${s.dist<1?Math.round(s.dist*1000)+' 公尺':s.dist.toFixed(1)+' 公里'}</span>`;return `<article class="card"><div class="cardtop"><div class="rank">${i+1}</div><div><h3>${s.name}</h3><div class="meta">${s.area}<br>${s.note}</div></div></div><div class="badges">${d}<span class="badge">路線 ${s.route}</span><span class="badge">上車 ${s.time}</span><span class="badge">車資 ${s.fee} 元</span></div><div class="actions"><a class="action nav" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}">開始導航</a><a class="action detail" href="#" onclick="alert('${s.name}\\n${s.note}\\n路線 ${s.route}｜${s.time} 上車');return false">站點資訊</a><button class="action fav ${isFav(s)?'on':''}" onclick="toggleFav('${s.name}')">★</button></div></article>`}
function renderNearest(list=withDist().slice(0,6)){document.getElementById('results').innerHTML=list.length?list.map(card).join(''):'<div class="empty">目前沒有符合條件的站點。</div>';document.getElementById('count').textContent=`顯示 ${list.length} 個站點`}
function initAreas(){const a=[...new Set(stops.map(s=>s.area))].sort();document.getElementById('areaFilter').innerHTML='<option value="">全部地區</option>'+a.map(x=>`<option>${x}</option>`).join('')}
function renderAll(){const a=document.getElementById('areaFilter').value,k=document.getElementById('keyword').value.trim();const list=withDist().filter(s=>(!a||s.area===a)&&(!k||s.name.includes(k)||s.route.includes(k)||s.area.includes(k)));document.getElementById('allresults').innerHTML=list.length?list.map(card).join(''):'<div class="empty">找不到符合的站點。</div>';document.getElementById('allcount').textContent=`共 ${list.length} 站`}
function showStatus(t){const e=document.getElementById('status');e.style.display='block';e.textContent=t}
function quickSearch(a){document.getElementById('address').value=a;origin=presets[a];renderNearest();renderMap();showStatus(`已依「${a}」市區中心排序最近站點。`)}
async function searchAddress(){const q=document.getElementById('address').value.trim();if(!q)return showStatus('請先輸入地址。');const key=Object.keys(presets).find(k=>q.includes(k));if(key)return quickSearch(key);showStatus('正在定位地址…');try{const r=await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tw&q=${encodeURIComponent(q)}`,{headers:{'Accept-Language':'zh-TW'}});const d=await r.json();if(!d.length)throw 0;origin=[+d[0].lat,+d[0].lon];renderNearest();renderMap();showStatus(`已定位：${d[0].display_name}`)}catch(e){showStatus('無法精確定位，請改輸入行政區、附近道路或使用目前位置。')}}
function useLocation(){if(!navigator.geolocation)return showStatus('此瀏覽器不支援定位。');showStatus('正在取得目前位置，請允許定位權限…');navigator.geolocation.getCurrentPosition(p=>{origin=[p.coords.latitude,p.coords.longitude];renderNearest();renderMap();showStatus('已依目前位置排序最近站點。')},()=>showStatus('無法取得位置，請確認定位權限。'),{enableHighAccuracy:true,timeout:10000})}
function resetSearch(){origin=presets.龍潭;document.getElementById('address').value='';renderNearest();renderAll();renderMap();showStatus('已恢復初始畫面。')}
function showFavorites(){const f=favs(),list=withDist().filter(s=>f.includes(s.name));switchView('nearest');renderNearest(list);showStatus(list.length?`已顯示 ${list.length} 個收藏站點。`:'目前尚未收藏站點。')}
function switchView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===id));if(id==='mapview')setTimeout(()=>{initMap();map.invalidateSize()},80)}
function initMap(){if(map)return;map=L.map('map').setView(origin,11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);renderMap()}
function renderMap(){if(!map)return;markers.forEach(m=>m.remove());markers=[];withDist().forEach(s=>{const m=L.marker([s.lat,s.lng]).addTo(map).bindPopup(`<b>${s.name}</b><br>路線 ${s.route}｜${s.time}<br>${s.note}`);markers.push(m)});if(origin){L.circleMarker(origin,{radius:8,color:'#0d6f66',fillColor:'#14b8a6',fillOpacity:1}).addTo(map).bindPopup('你的查詢位置');map.setView(origin,12)}}
async function sharePage(){const data={title:'新生醫專校車智慧站點查詢',text:'輸入地址快速查找最近校車站點',url:location.href};try{if(navigator.share)await navigator.share(data);else{await navigator.clipboard.writeText(location.href);alert('網址已複製')}}catch(e){}}
initAreas();renderNearest();renderAll();
</script></body></html>
