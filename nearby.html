<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>新生醫專｜附近校車站點</title>
<style>
:root{--b:#086c63;--b2:#15b8a6;--ink:#173535;--muted:#6a8080;--line:#d8ebe8;--soft:#e8f7f4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#dff7f3,#f7fbfb 360px);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}.app{max-width:760px;margin:auto;padding:16px 14px 50px}.hero{padding:25px 21px;border-radius:28px;color:#fff;background:linear-gradient(135deg,#075d55,#16b6a5);box-shadow:0 18px 45px rgba(8,108,99,.15)}.hero h1{font-size:28px;line-height:1.22;margin:7px 0}.hero p{margin:0;line-height:1.65;font-size:14px}.panel{margin-top:15px;padding:17px;background:#fff;border:1px solid var(--line);border-radius:23px;box-shadow:0 10px 28px rgba(8,108,99,.08)}.title{font-size:18px;font-weight:900}.hint{font-size:13px;color:var(--muted);line-height:1.55;margin:5px 0 10px}.row{display:grid;grid-template-columns:1fr auto;gap:8px}input{width:100%;height:51px;border:1.5px solid #b8d8d4;border-radius:14px;padding:0 13px;font-size:16px;outline:none}input:focus{border-color:var(--b2);box-shadow:0 0 0 4px rgba(21,184,166,.12)}button{border:0;border-radius:14px;min-height:48px;padding:0 15px;font-weight:900;cursor:pointer}.primary{background:var(--b);color:#fff}.locate{width:100%;margin-top:9px;background:var(--soft);color:var(--b)}.chips{display:flex;gap:8px;overflow:auto;padding-top:11px}.chip{white-space:nowrap;min-height:37px;background:#fff;border:1px solid var(--line);color:#456463}.status{display:none;margin-top:11px;padding:11px 13px;border-radius:13px;background:#fff5cf;color:#7b5900;font-size:13px;line-height:1.6}.progress{display:none;height:8px;margin-top:10px;background:#e5efed;border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--b),var(--b2));transition:.2s}.head{display:flex;justify-content:space-between;align-items:end;margin:19px 2px 10px}.head h2{font-size:20px;margin:0}.head small{color:var(--muted)}.intro{display:none;margin-bottom:11px;padding:14px;border-radius:18px;background:#173535;color:#fff}.intro b{display:block;font-size:17px;margin-bottom:4px}.intro span{font-size:13px;opacity:.85}.cards{display:grid;gap:11px}.card{position:relative;padding:15px;background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 22px rgba(8,108,99,.07)}.card.best{border:2px solid var(--b2)}.bestTag{position:absolute;right:12px;top:12px;padding:5px 8px;border-radius:999px;background:#dff8f3;color:#087267;font-size:11px;font-weight:900}.top{display:flex;justify-content:space-between;gap:10px;padding-right:65px}.name{font-size:18px;font-weight:900}.area{font-size:13px;color:var(--muted);margin-top:3px}.time{background:#e8f2ff;color:#275f9e;border-radius:10px;padding:7px 9px;font-weight:900;height:max-content}.badges{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}.badge{padding:5px 8px;border-radius:999px;background:#edf8f6;color:#286762;font-size:12px;font-weight:850}.distance{background:#dcfce7;color:#166534}.walk{background:#e6f1ff;color:#275b9c}.address{font-size:13px;color:#536a69;line-height:1.65}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.actions a{min-height:42px;border-radius:12px;display:grid;place-items:center;text-decoration:none;font-size:13px;font-weight:900}.nav{background:var(--b);color:#fff}.all{background:var(--soft);color:var(--b)}.empty{padding:28px 18px;border:1px dashed #b7d8d3;border-radius:20px;background:#fff;text-align:center;color:var(--muted);line-height:1.7}.note{text-align:center;color:#7b8f8e;font-size:12px;line-height:1.7;margin-top:14px}@media(max-width:520px){.hero h1{font-size:24px}.row{grid-template-columns:1fr}.primary{width:100%}}
</style>
</head>
<body><main class="app">
<section class="hero"><div>HSC SCHOOL BUS</div><h1>我住這裡，<br>要去哪裡搭車？</h1><p>輸入地址、社區、學校或地標，系統會定位後比較附近校車站點。</p></section>
<section class="panel"><div class="title">📍 你從哪裡搭車？</div><div class="hint">例如：桃園藝文特區、台茂購物中心、內壢火車站、龍潭大池。</div><div class="row"><input id="place" placeholder="輸入地址、社區、學校或地標"><button class="primary" onclick="searchNearby()">找附近站點</button></div><button class="locate" onclick="useLocation()">使用我的目前位置</button><div class="chips"><button class="chip" onclick="example('桃園藝文特區')">藝文特區</button><button class="chip" onclick="example('台茂購物中心')">台茂</button><button class="chip" onclick="example('內壢火車站')">內壢火車站</button><button class="chip" onclick="example('龍潭大池')">龍潭大池</button></div><div id="status" class="status"></div><div id="progress" class="progress"><i id="bar"></i></div></section>
<div class="head"><h2>附近校車站點</h2><small id="count">先輸入位置</small></div><div id="intro" class="intro"></div><section id="results" class="cards"><div class="empty">輸入「藝文特區」這類地標，也能直接查附近站點。</div></section>
<p class="note">距離採直線估算，步行時間僅供比較；實際候車資訊以學校最新公告為準。</p>
</main>
<script src="full-routes.js"></script>
<script>
let stops=[],origin=null;const el=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const km=(a,b,c,d)=>{const R=6371,x=(c-a)*Math.PI/180,y=(d-b)*Math.PI/180,z=Math.sin(x/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;return R*2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z))};
const walk=d=>Math.max(1,Math.round(d/4.5*60));function status(t){el('status').style.display='block';el('status').textContent=t}function progress(show,p=0){el('progress').style.display=show?'block':'none';el('bar').style.width=p+'%'}
async function geocode(q){const r=await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=tw&q='+encodeURIComponent(q),{headers:{'Accept-Language':'zh-TW'}});const d=await r.json();if(!d.length)throw Error('not found');return{lat:+d[0].lat,lng:+d[0].lon,label:d[0].display_name}}
function candidates(label){const district=stops.filter(s=>label.includes(s.area.replace(/^桃園市|^新竹縣|^新竹市|^新北市|^台北市/,'')));if(district.length>=6)return district.slice(0,18);const city=label.includes('桃園')?'桃園市':label.includes('新竹縣')?'新竹縣':label.includes('新竹')?'新竹市':label.includes('新北')?'新北市':label.includes('台北')?'台北市':'';return (city?stops.filter(s=>s.area.startsWith(city)):stops).slice(0,18)}
async function locateStop(s){const key='hscgeo:'+s.id;try{const c=JSON.parse(localStorage.getItem(key)||'null');if(c)return c}catch(e){}if(Number.isFinite(s.lat)&&Number.isFinite(s.lng))return{lat:s.lat,lng:s.lng};const p=await geocode((s.address||'')+' '+s.area+' '+s.name);localStorage.setItem(key,JSON.stringify(p));return p}
function card(s,i){return `<article class="card ${i===0?'best':''}">${i===0?'<span class="bestTag">首選推薦</span>':''}<div class="top"><div><div class="name">${esc(s.name)}</div><div class="area">${esc(s.area)}</div></div><div class="time">${esc(s.time)}</div></div><div class="badges"><span class="badge distance">約 ${s.dist<1?Math.round(s.dist*1000)+' 公尺':s.dist.toFixed(1)+' 公里'}</span><span class="badge walk">步行約 ${walk(s.dist)} 分</span><span class="badge">車號 ${esc(s.bus)}</span><span class="badge">${esc(s.route)}</span></div><div class="address">${esc(s.address)}</div><div class="actions"><a class="nav" target="_blank" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}">開始導航</a><a class="all" href="./">查看完整路線</a></div></article>`}
async function run(originPoint,label){origin=originPoint;const rows=candidates(label),found=[];el('results').innerHTML='<div class="empty">正在比對附近站點…</div>';for(let i=0;i<rows.length;i++){try{const p=await locateStop(rows[i]);found.push({...rows[i],lat:p.lat,lng:p.lng,dist:km(origin.lat,origin.lng,p.lat,p.lng)})}catch(e){}progress(true,Math.round((i+1)/rows.length*100));status(`正在比對附近站點… ${i+1}/${rows.length}`);await new Promise(r=>setTimeout(r,260))}progress(false);found.sort((a,b)=>a.dist-b.dist);const show=found.slice(0,6);if(!show.length)throw Error('no stops');el('results').innerHTML=show.map(card).join('');el('count').textContent='顯示最近 '+show.length+' 站';el('intro').style.display='block';el('intro').innerHTML='<b>距離「'+esc(el('place').value||'目前位置')+'」最近的校車站點</b><span>已依地理距離由近到遠排序。</span>';status('搜尋完成！')}
async function searchNearby(){const q=el('place').value.trim();if(!q)return status('請先輸入地址或地標。');progress(true,5);status('正在定位「'+q+'」…');try{const p=await geocode(q);await run(p,p.label)}catch(e){progress(false);el('results').innerHTML='<div class="empty">目前無法定位，請輸入更完整名稱，例如「桃園市桃園區藝文特區」。</div>';status('定位失敗，請換個較完整的地址或地標。')}}
function example(q){el('place').value=q;searchNearby()}function useLocation(){if(!navigator.geolocation)return status('此瀏覽器不支援定位。');status('正在取得目前位置…');navigator.geolocation.getCurrentPosition(p=>{el('place').value='我的目前位置';run({lat:p.coords.latitude,lng:p.coords.longitude},'桃園')},()=>status('無法取得位置，請確認定位權限。'),{enableHighAccuracy:true,timeout:10000})}
(async()=>{stops=await loadHscRoutes();if(stops.length<100)status('完整資料來源暫時無法連線，目前使用備援站點。')})();
</script></body></html>
